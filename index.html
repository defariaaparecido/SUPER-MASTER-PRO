<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIAKART SUPER MASTER PRO 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; min-height: 100vh; }
    .header {
      background: linear-gradient(135deg, #8B0000 0%, #C0143C 50%, #8B0000 100%);
      padding: 18px 30px; display: flex; align-items: center;
      justify-content: space-between; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    .logo-box {
      background: white; padding: 6px 12px; border-radius: 6px;
      font-weight: 900; font-size: 22px; color: #C0143C; letter-spacing: 2px; line-height: 1.1;
    }
    .logo-box span { display: block; font-size: 11px; color: #333; letter-spacing: 1px; }
    .header-title { color: white; text-align: center; flex: 1; }
    .header-title h1 { font-size: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    .header-title p { font-size: 12px; opacity: 0.85; margin-top: 4px; letter-spacing: 1px; }
    .header-year { color: white; font-size: 42px; font-weight: 900; opacity: 0.2; letter-spacing: 2px; }
    nav {
      background: #111; padding: 0 20px; display: flex; gap: 4px;
      overflow-x: auto; border-bottom: 3px solid #C0143C;
    }
    nav::-webkit-scrollbar { height: 4px; }
    nav::-webkit-scrollbar-thumb { background: #C0143C; border-radius: 2px; }
    .tab-btn {
      background: none; border: none; color: #aaa; padding: 14px 22px;
      font-size: 13px; font-weight: 600; cursor: pointer; text-transform: uppercase;
      letter-spacing: 1px; white-space: nowrap; transition: all 0.2s;
      border-bottom: 3px solid transparent; margin-bottom: -3px;
    }
    .tab-btn:hover { color: white; background: rgba(192,20,60,0.15); }
    .tab-btn.active { color: #C0143C; border-bottom-color: #C0143C; background: rgba(192,20,60,0.1); }
    .sheet-container { width: 100%; height: calc(100vh - 130px); position: relative; }
    .sheet-frame { display: none; width: 100%; height: 100%; border: none; }
    .sheet-frame.active { display: block; }
    .footer {
      background: #111; color: #555; text-align: center;
      padding: 8px; font-size: 11px; border-top: 1px solid #222;
    }
    @media (max-width: 600px) {
      .header { padding: 12px 15px; }
      .header-title h1 { font-size: 14px; letter-spacing: 1px; }
      .header-year { display: none; }
      .tab-btn { padding: 10px 14px; font-size: 11px; }
      .sheet-container { height: calc(100vh - 110px); }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo-box">VIA<span>KART</span></div>
    <div class="header-title">
      <h1>Campeonato Super Master Pro</h1>
      <p>Temporada 2026 • Resultados Oficiais</p>
    </div>
    <div class="header-year">2026</div>
  </div>

  <nav>
    <button class="tab-btn active" onclick="showTab(0)" id="tab-0">🏆 Classificação Geral</button>
    <button class="tab-btn" onclick="showTab(1)" id="tab-1">📊 Camp. Piloto Evol.</button>
    <button class="tab-btn" onclick="showTab(2)" id="tab-2">📋 Tabela</button>
    <button class="tab-btn" onclick="showTab(3)" id="tab-3">🔄 Troca Kart</button>
    <button class="tab-btn" onclick="showTab(4)" id="tab-4">✅ Presenças</button>
  </nav>

  <div class="sheet-container">
    <iframe class="sheet-frame active" id="frame-0"
      src="https://docs.google.com/spreadsheets/d/1shp_DQ1zqB3qg6P3LUG0gV4Ba9mJAm8sQXukLonIQzA/pubhtml?gid=1120059320&single=true&widget=false&headers=false"
      title="Classificação Geral"></iframe>
    <iframe class="sheet-frame" id="frame-1"
      data-src="https://docs.google.com/spreadsheets/d/1shp_DQ1zqB3qg6P3LUG0gV4Ba9mJAm8sQXukLonIQzA/pubhtml?gid=1147203686&single=true&widget=false&headers=false"
      title="Camp Piloto Evol"></iframe>
    <iframe class="sheet-frame" id="frame-2"
      data-src="https://docs.google.com/spreadsheets/d/1shp_DQ1zqB3qg6P3LUG0gV4Ba9mJAm8sQXukLonIQzA/pubhtml?gid=1747214511&single=true&widget=false&headers=false"
      title="Tabela"></iframe>
    <iframe class="sheet-frame" id="frame-3"
      data-src="https://docs.google.com/spreadsheets/d/1shp_DQ1zqB3qg6P3LUG0gV4Ba9mJAm8sQXukLonIQzA/pubhtml?gid=1316128971&single=true&widget=false&headers=false"
      title="Troca Kart"></iframe>
    <iframe class="sheet-frame" id="frame-4"
      data-src="https://docs.google.com/spreadsheets/d/1shp_DQ1zqB3qg6P3LUG0gV4Ba9mJAm8sQXukLonIQzA/pubhtml?gid=1541414476&single=true&widget=false&headers=false"
      title="Presenças"></iframe>
  </div>

  <div class="footer">
    VIAKART SUPER MASTER PRO 2026 • Dados actualizados directamente das planilhas oficiais
  </div>

  <script>
    let activeTab = 0;
    function showTab(index) {
      document.getElementById('frame-' + activeTab).classList.remove('active');
      document.getElementById('tab-' + activeTab).classList.remove('active');
      activeTab = index;
      const frame = document.getElementById('frame-' + index);
      if (frame.dataset.src) { frame.src = frame.dataset.src; delete frame.dataset.src; }
      frame.classList.add('active');
      document.getElementById('tab-' + index).classList.add('active');
      history.replaceState(null, '', '#tab' + index);
    }
    window.addEventListener('load', function() {
      const hash = window.location.hash;
      if (hash && hash.startsWith('#tab')) {
        const idx = parseInt(hash.replace('#tab', ''));
        if (idx >= 0 && idx <= 4) showTab(idx);
      }
    });
  </script>
</body>
</html>
